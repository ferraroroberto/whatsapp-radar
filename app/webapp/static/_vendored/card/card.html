<!-- Fleet card — markup skeleton (copy and adapt).
     A plain content group: header row + body. For a *collapsible* card, use
     the disclosure component instead (details.card.card--collapsible). -->
<div class="card">
  <div class="card-head">
    <h3 class="card-title">
      <svg class="icon" aria-hidden="true"><use href="#i-house"></use></svg>
      Card title
    </h3>
    <span class="card-head-meta">3 items</span>
  </div>
  <p class="card-meta">Optional muted meta line.</p>
  <!-- card body content -->
</div>
