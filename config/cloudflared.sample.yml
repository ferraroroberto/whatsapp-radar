# Named Cloudflare tunnel config — committed template (DISABLED until you wire it).
#
# Copy this file to webapp/cloudflared.yml and fill in your values.
# webapp/cloudflared.yml is gitignored so your tunnel UUID + hostname stay out
# of version control. Until that file exists, the tray runs Tailscale-only and
# never spawns cloudflared.
#
# One-time setup:
#   1. cloudflared tunnel login
#   2. cloudflared tunnel create whatsapp-radar
#      → prints a UUID and writes credentials to ~/.cloudflared/<UUID>.json
#   3. cloudflared tunnel route dns whatsapp-radar radar.<your-domain>
#   4. Copy this file to webapp/cloudflared.yml and edit `tunnel:` + `hostname:`
#   5. webapp_tunnel_named.bat (or just tray.bat — the tray adopts the same config)

# Tunnel UUID — replace with the one returned by `tunnel create`.
tunnel: 00000000-0000-0000-0000-000000000000

# Credentials file — by default cloudflared looks at ~/.cloudflared/<UUID>.json.
# Only set this explicitly if you stored the JSON somewhere non-default.
# credentials-file: C:\Users\<you>\.cloudflared\<UUID>.json

ingress:
  # Public hostname → local webapp. The webapp serves plain HTTP; Cloudflare's
  # edge provides the public TLS.
  - hostname: radar.<your-domain>
    service: http://localhost:8455
  # Catch-all — anything that doesn't match gets a clean 404.
  - service: http_status:404
