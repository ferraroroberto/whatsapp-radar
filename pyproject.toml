# Tool configuration only. WhatsApp Radar is not an installable package — it is
# run from a checkout via `python launcher.py` (see CLAUDE.md for the src/+app/
# layout shared across the fleet). Runtime deps live in requirements.txt.

[tool.ruff]
src = ["src", "app", "tests"]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.mypy]
python_version = "3.11"
mypy_path = "."
explicit_package_bases = true
strict = true
warn_unused_ignores = true
