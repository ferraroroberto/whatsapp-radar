# Tool configuration only. WhatsApp Radar is not an installable package — it is
# run from a checkout via `python launcher.py` (see CLAUDE.md for the src/+app/
# layout shared across the fleet). Runtime deps live in requirements.txt.

[tool.ruff]
src = ["src", "app", "tests"]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "UP", "B"]

[tool.ruff.lint.flake8-bugbear]
# FastAPI's documented idiom evaluates Depends()/Query()/etc. in argument
# defaults; without this allowlist B008 (function-call-in-default-argument)
# flags every injected dependency (e.g. `conn = Depends(get_conn)`).
extend-immutable-calls = ["fastapi.Depends"]

[tool.ruff.lint.isort]
known-first-party = ["src", "app", "tests", "config", "scripts"]

[tool.mypy]
python_version = "3.11"
mypy_path = "."
explicit_package_bases = true
strict = true
warn_unused_ignores = true

# Webapp third-party deps ship no type stubs. Keep our own code strict; just
# silence the missing-import noise for these libraries.
[[tool.mypy.overrides]]
module = [
    "fastapi.*",
    "starlette.*",
    "uvicorn.*",
    "webauthn.*",
    "pystray.*",
    "PIL.*",
    "yaml",
    "psutil",
    "winotify",
    "requests.*",
    "urllib3.*",
    "langdetect.*",
    "google.*",
    "google_auth_oauthlib.*",
    "googleapiclient.*",
]
ignore_missing_imports = true
