[pytest]
testpaths = tests
python_files = test_*.py
python_functions = test_*
asyncio_mode = auto
addopts = -q
# e2e (tests/e2e) needs Playwright browsers + a booted webapp. Plain `pytest`
# collects them but tests/e2e/conftest.py skips the suite unless WR_E2E_AUTOBOOT=1
# (it self-boots) or a tray is already live on :8455.
markers =
    smoke: end-to-end browser tests (tests/e2e; self-boot the webapp on a free port)
